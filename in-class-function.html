<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Subtract Example</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; }
  </style>
</head>
<body>

<script>
function subtract(a, b, c, d) {
  return a - b - c - d;
}

let result;
let values;

function setup() {
  createCanvas(400, 200);
  values = [20, 3, 4, 1];
  result = subtract(...values);
  textAlign(LEFT, CENTER);
  textSize(18);
}

function draw() {
  background(240);
  fill(30);
  text('Press the canvas to subtract new values.', 20, 40);
  text('Current values: ' + values.join(', '), 20, 80);
  text('Result: ' + result, 20, 120);
}

function mousePressed() {
  values = [
    floor(random(5, 30)),
    floor(random(1, 10)),
    floor(random(1, 10)),
    floor(random(1, 5))
  ];
  result = subtract(...values);
}
</script>

</body>
</html>
